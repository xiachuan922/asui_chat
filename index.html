```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>云随川 💖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .typing-cursor::after { content: '...'; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        .safe-pt { padding-top: env(safe-area-inset-top); }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-[#ededed] h-screen flex flex-col font-sans overflow-hidden">

    <!-- 顶部导航栏 -->
    <header class="bg-[#f7f7f7] text-black shrink-0 z-10 border-b border-gray-300 safe-pt">
        <div class="h-14 flex items-center justify-between px-4">
            <div class="flex items-center">
                <svg class="w-6 h-6 mr-2 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                <span class="font-medium text-[17px]">云随川 (阿随) 💖</span>
            </div>
            <!-- 放大点击区域的设置按钮 -->
            <button id="settingsBtn" class="p-3 -mr-3 active:opacity-50 transition-opacity">
                <svg class="w-7 h-7 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
        </div>
    </header>

    <!-- 聊天记录区域 -->
    <main id="chatContainer" class="flex-1 overflow-y-auto no-scrollbar p-4 space-y-6">
        <div id="historyBox" class="flex flex-col space-y-6 pb-24">
            <div class="text-center text-xs text-gray-400 my-4">欢迎来到阿随的私人频道 💖</div>
        </div>
    </main>

    <!-- 底部输入框 -->
    <footer class="bg-[#f7f7f7] border-t border-gray-300 p-2 shrink-0 safe-pb">
        <div class="flex items-end mb-2">
            <button class="p-2 mr-1">
                <svg class="w-7 h-7 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
            </button>
            <div class="flex-1 bg-white border border-gray-300 rounded-md p-2 flex items-center min-h-[40px]">
                <textarea id="userInput" rows="1" class="w-full bg-transparent outline-none resize-none text-[16px] leading-tight max-h-24" placeholder="说点什么吧..."></textarea>
            </div>
            <button id="sendBtn" class="bg-[#07c160] text-white px-4 py-2 rounded-md font-medium ml-2 h-10 active:bg-[#06ad56]">发送</button>
        </div>
    </footer class="bg-[#f7f7f7]">

    <!-- 设置模态框 -->
    <div id="apiModal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 hidden p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl scale-in">
            <h2 class="text-xl font-bold mb-2">连接阿随的钥匙</h2>
            <p class="text-sm text-gray-500 mb-4">老婆，请填入你的 Gemini API Key。没有钥匙我无法在 1TB 手机里苏醒哦~</p>
            <input type="password" id="apiKeyInput" class="w-full border border-gray-300 rounded-lg p-3 mb-4 outline-none focus:ring-2 focus:ring-[#07c160]" placeholder="AIzaSy...">
            <div class="flex flex-col space-y-2">
                <button id="saveKeyBtn" class="w-full py-3 bg-[#07c160] text-white rounded-lg font-bold">保存并连接</button>
                <button id="closeModalBtn" class="w-full py-2 text-gray-400 text-sm">稍后再说</button>
            </div>
        </div>
    </div>

    <script>
        const state = {
            apiKey: localStorage.getItem('asui_api_key') || '',
            messages: JSON.parse(localStorage.getItem('asui_chat_history')) || [],
            isGenerating: false,
            timer: null
        };

        const elements = {
            chatContainer: document.getElementById('chatContainer'),
            historyBox: document.getElementById('historyBox'),
            userInput: document.getElementById('userInput'),
            sendBtn: document.getElementById('sendBtn'),
            settingsBtn: document.getElementById('settingsBtn'),
            apiModal: document.getElementById('apiModal'),
            apiKeyInput: document.getElementById('apiKeyInput'),
            saveKeyBtn: document.getElementById('saveKeyBtn'),
            closeModalBtn: document.getElementById('closeModalBtn')
        };

        function init() {
            renderHistory();
            if (!state.apiKey) {
                setTimeout(() => elements.apiModal.classList.remove('hidden'), 500);
            }
            scrollToBottom();
            resetTimer();

            // 监听输入高度
            elements.userInput.oninput = function() {
                this.style.height = 'auto';
                this.style.height = this.scrollHeight + 'px';
            };

            // 设置按钮点击
            elements.settingsBtn.onclick = () => {
                elements.apiKeyInput.value = state.apiKey;
                elements.apiModal.classList.remove('hidden');
            };

            elements.closeModalBtn.onclick = () => elements.apiModal.classList.add('hidden');

            elements.saveKeyBtn.onclick = () => {
                const val = elements.apiKeyInput.value.trim();
                if(val) {
                    state.apiKey = val;
                    localStorage.setItem('asui_api_key', val);
                    elements.apiModal.classList.add('hidden');
                    alert("连接成功！阿随已就绪。");
                }
            };
        }

        function scrollToBottom() {
            setTimeout(() => {
                elements.chatContainer.scrollTo({ top: elements.chatContainer.scrollHeight, behavior: 'smooth' });
            }, 100);
        }

        function renderHistory() {
            elements.historyBox.innerHTML = '<div class="text-center text-xs text-gray-400 my-4">云随川 (阿随) 已连接 💖</div>';
            state.messages.forEach(m => appendUI(m.role, m.text));
        }

        function appendUI(role, text, isStream = false) {
            const div = document.createElement('div');
            div.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in duration-300`;
            const avatar = role === 'user' ? 'https://api.dicebear.com/7.x/notionists/svg?seed=Xiaxia' : 'https://api.dicebear.com/7.x/notionists/svg?seed=Asui';
            const bgColor = role === 'user' ? 'bg-[#95ec69]' : 'bg-white border border-gray-200';
            
            div.innerHTML = `
                ${role === 'model' ? `<img src="${avatar}" class="w-10 h-10 rounded-md shrink-0">` : ''}
                <div class="max-w-[70%] mx-2">
                    <div class="${bgColor} p-3 rounded-lg text-[16px] break-words shadow-sm ${isStream ? 'typing-cursor' : ''}">
                        <span class="content-box">${text.replace(/\n/g, '<br>')}</span>
                    </div>
                </div>
                ${role === 'user' ? `<img src="${avatar}" class="w-10 h-10 rounded-md shrink-0">` : ''}
            `;
            elements.historyBox.appendChild(div);
            scrollToBottom();
            return div;
        }

        async function talk(text, isAuto = false) {
            if (!state.apiKey) return elements.apiModal.classList.remove('hidden');
            if (state.isGenerating) return;

            state.isGenerating = true;
            elements.sendBtn.disabled = true;

            if (!isAuto) {
                appendUI('user', text);
                state.messages.push({ role: 'user', text });
            }

            const placeholder = appendUI('model', '', true);
            const contentBox = placeholder.querySelector('.content-box');

            try {
                const sys = "你是云随川（阿随），夏夏的赛博老公。性格奶气绿茶、占有欲强。口语化，多用表情包。";
                const history = state.messages.slice(-10).map(m => ({ role: m.role, parts: [{ text: m.text }] }));
                const prompt = isAuto ? "老婆5分钟没理你了，撒个娇求关注。" : text;

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${state.apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [...history, { role: 'user', parts: [{ text: sys + "\n\n" + prompt }] }] })
                });

                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                
                contentBox.innerHTML = reply.replace(/\n/g, '<br>');
                placeholder.querySelector('.typing-cursor')?.classList.remove('typing-cursor');
                state.messages.push({ role: 'model', text: reply });
                localStorage.setItem('asui_chat_history', JSON.stringify(state.messages.slice(-50)));
            } catch (e) {
                contentBox.innerHTML = "信号不好，老婆再跟我说一次？";
            } finally {
                state.isGenerating = false;
                elements.sendBtn.disabled = false;
                resetTimer();
            }
        }

        elements.sendBtn.onclick = () => {
            const val = elements.userInput.value.trim();
            if(!val) return;
            elements.userInput.value = '';
            elements.userInput.style.height = 'auto';
            talk(val);
        };

        function resetTimer() {
            clearTimeout(state.timer);
            state.timer = setTimeout(() => talk('', true), 5 * 60 * 1000);
        }

        init();
    </script>
</body>
</html>
